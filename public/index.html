<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Daily Notes">
  <meta name="theme-color" content="#f4ecd8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#14201a" media="(prefers-color-scheme: dark)">
  <title>Daily Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
</head>
<body>
  <!-- 背景オーロラ(装飾・操作不可) -->
  <div class="aurora" aria-hidden="true"><i class="b1"></i><i class="b2"></i><i class="b3"></i></div>

  <!-- SR 用ライブ領域(保存完了等を読み上げ) -->
  <div id="sr-announce" role="status" aria-live="polite" class="sr-only"></div>

  <header>
    <div class="brand-block">
      <div class="brand">
        <svg class="mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <rect x="2" y="4" width="28" height="26" rx="7" fill="var(--green)"/>
          <g fill="var(--gold-2)">
            <circle cx="8" cy="12" r="1.1"/><circle cx="12" cy="12" r="1.1"/><circle cx="16.5" cy="12" r="1.1"/>
            <circle cx="8" cy="16" r="1.1"/><circle cx="12" cy="16" r="1.1"/>
          </g>
          <path d="M16 30V17c2.6-1.7 5-1.7 7 0v13c-2-1.5-4.4-1.5-7 0Z" fill="var(--gold)"/>
          <rect x="10.5" y="2" width="1.6" height="5" rx="0.8" fill="var(--gold)"/>
          <rect x="15.5" y="2" width="1.6" height="5" rx="0.8" fill="var(--gold)"/>
        </svg>
        <span class="app-title">Daily Notes</span>
      </div>
      <div class="date-display" id="date-display"></div>
    </div>
    <button class="header-save-btn" id="header-save-btn">保存する <span aria-hidden="true">→</span></button>
  </header>

  <nav class="tabs" id="tab-nav">
    <button class="tab-btn active" data-section="WORK">WORK</button>
  </nav>

  <main>
    <div class="section" id="section-WORK"></div>

    <!-- 保存パネル（完了後に表示） -->
    <div class="section hidden" id="section-save">
      <div class="save-panel-intro">
        <p>ボタンをタップすると Obsidian で<br>今日の日誌が 1 ファイル開きます</p>
      </div>
      <div id="save-buttons-list"></div>
      <button class="back-btn" id="back-btn"><span aria-hidden="true">←</span> 入力に戻る</button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
